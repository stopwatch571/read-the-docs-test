site_name: RTD Test Docs
docs_dir: .

repo_name: stopwatch571/read-the-docs-test
repo_url: https://github.com/stopwatch571/read-the-docs-test

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture (arc42):
    - arc42/index.md
    - "1. Introduction": arc42/01-introduction.md
    - "2. Constraints": arc42/02-constraints.md
    - "3. Context": arc42/03-context.md
    - "4. Solution Strategy": arc42/04-solution-strategy.md
    - "5. Building Blocks": arc42/05-building-blocks.md
    - "6. Runtime View": arc42/06-runtime.md
    - "7. Deployment": arc42/07-deployment.md
    - "8. Cross-cutting": arc42/08-crosscutting.md
    - "9. Decisions": arc42/09-decisions.md
    - "10. Quality": arc42/10-quality.md
    - "11. Risks": arc42/11-risks.md
    - "12. Glossary": arc42/12-glossary.md

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-2
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html
