site_name: RTD Test Docs
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture (arc42):
    - "1. Introduction": arc42/01-introduction.md
    - "2. Constraints": arc42/02-constraints.md
    - "3. Context": arc42/03-context.md
    - "4. Solution Strategy": arc42/04-solution-strategy.md
    - "5. Building Blocks": arc42/05-building-blocks.md
    - "6. Runtime View": arc42/06-runtime.md
    - "7. Deployment": arc42/07-deployment.md
    - "8. Cross-cutting": arc42/08-crosscutting.md
    - "9. Decisions": arc42/09-decisions.md
    - "10. Quality": arc42/10-quality.md
    - "11. Risks": arc42/11-risks.md
    - "12. Glossary": arc42/12-glossary.md
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
